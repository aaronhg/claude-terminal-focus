<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 13px;
    background: #1e1e1e;
    color: #ccc;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  #header {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #e0e0e0;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 4px;
  }
  .header-btn:hover { color: #ccc; background: rgba(255,255,255,0.08); }
  #clear:disabled { opacity: 0.3; cursor: default; }
  #clear:disabled:hover { color: #888; background: none; }
  .header-actions { display: flex; align-items: center; gap: 4px; }
  #list {
    overflow-y: auto;
    max-height: 360px;
  }
  .item {
    border-bottom: 1px solid #2a2a2a;
    overflow: hidden;
  }
  .item-inner {
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, background 0.15s, opacity 0.15s;
  }
  .item-inner:hover { background: #2a2a2a; }
  .item.swiping .item-inner { transition: none; }
  .icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    font-size: 14px;
  }
  .info {
    flex: 1;
    min-width: 0;
  }
  .name {
    font-weight: 600;
    color: #e0e0e0;
    font-size: 13px;
  }
  .message {
    color: #888;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .time {
    flex-shrink: 0;
    color: #666;
    font-size: 10px;
  }
  .icon { color: #ffffff; }
  .item.state-dead .item-inner { opacity: 0.45; }
  #empty {
    padding: 40px 12px;
    text-align: center;
    color: #666;
  }
</style>
</head>
<body>
<div id="header"><span>Claude Code Sessions</span><div class="header-actions"><button id="clear" class="header-btn" style="font-size:13px" onclick="dismissAllDead()" disabled>&#x232B;</button><button id="refresh" class="header-btn" onclick="render(readStateFile())">&#x21bb;</button></div></div>
<div id="list"></div>
<div id="empty" style="display:none">No active sessions</div>

<script>
const fs = require('fs');
const path = require('path');
const os = require('os');
const { ipcRenderer } = require('electron');

const HOOKS_DIR = path.join(os.homedir(), '.claude', 'hooks');
const STATE_FILE = path.join(HOOKS_DIR, '.focus-state.json');
const SIGNAL_FILE = path.join(HOOKS_DIR, '.focus-signal');

function readStateFile() {
  try { return JSON.parse(fs.readFileSync(STATE_FILE, 'utf-8')); }
  catch { return []; }
}

function writeSignal(pid) {
  fs.writeFileSync(SIGNAL_FILE, String(pid));
}

function updateStateFile(transformFn) {
  const data = transformFn(readStateFile());
  const tmp = STATE_FILE + '.tmp';
  fs.writeFileSync(tmp, JSON.stringify(data, null, 2));
  fs.renameSync(tmp, STATE_FILE);
  return data;
}

function dismissFromFile(pid) {
  try { return updateStateFile(s => s.filter(x => x.pid !== pid)); }
  catch { return []; }
}

function dismissAllDead() {
  try { render(updateStateFile(s => s.filter(x => x.state !== 'dead'))); }
  catch {}
}

function ackInFile(pid) {
  try {
    return updateStateFile(s => s.map(x =>
      x.pid === pid && (x.state === 'done' || x.state === 'attention')
        ? { ...x, state: 'seen' } : x
    ));
  } catch { return null; }
}

const list = document.getElementById('list');
const empty = document.getElementById('empty');

let pendingRender = null;
let lastStateJson = '';
let swipeCooldown = false;
const STATE_ICONS = {
  thinking: '\u25B6',
  done: '\u25CF',
  attention: '\u25CF',
  dead: '',
  seen: '',
};

function formatTime(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return 'now';
  if (diff < 3600) return `${Math.floor(diff / 60)}m`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
  return `${Math.floor(diff / 86400)}d`;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds}s`;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return s > 0 ? `${m}m ${s}s` : `${m}m`;
}

function durationText(s) {
  if (s.state === 'thinking' && s.startedAt) {
    const elapsed = Math.floor(Date.now() / 1000) - s.startedAt;
    return formatDuration(elapsed);
  }
  if ((s.state === 'done' || s.state === 'attention' || s.state === 'seen') && s.startedAt) {
    const dur = s.timestamp - s.startedAt;
    return `took ${formatDuration(dur)}`;
  }
  return '';
}

function dirName(cwd) {
  return path.basename(cwd) || cwd;
}

const _escDiv = document.createElement('div');
function escapeHtml(str) {
  _escDiv.textContent = str;
  return _escDiv.innerHTML;
}

function render(state) {
  if (document.querySelector('.item.swiping')) {
    pendingRender = state;
    return;
  }
  pendingRender = null;

  const json = JSON.stringify(state);
  if (json === lastStateJson) return;
  lastStateJson = json;

  if (!state || state.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  state.sort((a, b) => b.timestamp - a.timestamp);

  const hasInactive = state.some(s => s.state === 'dead');
  document.getElementById('clear').disabled = !hasInactive;

  list.innerHTML = state.map(s => {
    const dur = durationText(s);
    return `
    <div class="item state-${escapeHtml(s.state)}" data-pid="${escapeHtml(String(s.pid))}">
      <div class="item-inner">
        <div class="icon">${STATE_ICONS[s.state] ?? '\u25CB'}</div>
        <div class="info">
          <div class="name">${escapeHtml(dirName(s.cwd))}</div>
          <div class="message">${s.message ? escapeHtml(s.message) : '&nbsp;'}</div>
          ${dur ? `<div class="message">${escapeHtml(dur)}</div>` : ''}
        </div>
        <div class="time" data-ts="${escapeHtml(String(s.timestamp))}">${formatTime(s.timestamp)}</div>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.item').forEach(setupItem);
}

function setupItem(item) {
  const pid = Number(item.dataset.pid);
  const inner = item.querySelector('.item-inner');
  const THRESHOLD = 180; // > half width to dismiss
  let offsetX = 0;
  let decayTimer = null;
  let triggered = false;

  // Wheel on the .item container (stays in place), moves .item-inner visually
  item.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return;
    e.preventDefault();
    e.stopPropagation();
    if (triggered || swipeCooldown) return;

    clearTimeout(decayTimer);
    offsetX += e.deltaX * -1.5;
    offsetX = Math.max(-360, Math.min(360, offsetX));

    item.classList.add('swiping');
    inner.style.transform = `translateX(${offsetX}px)`;

    if (Math.abs(offsetX) > THRESHOLD) {
      // Swipe either direction -> dismiss
      const dir = offsetX < 0 ? '-100%' : '100%';
      triggered = true;
      swipeCooldown = true;
      item.classList.remove('swiping');
      inner.style.transition = 'transform 0.2s, opacity 0.2s';
      inner.style.transform = `translateX(${dir})`;
      inner.style.opacity = '0';
      setTimeout(() => {
        const data = dismissFromFile(pid);
        setTimeout(() => render(data), 50);
      }, 200);
      setTimeout(() => { swipeCooldown = false; }, 600);
      return;
    }

    decayTimer = setTimeout(() => {
      item.classList.remove('swiping');
      offsetX = 0;
      inner.style.transition = 'transform 0.15s';
      inner.style.transform = '';
      setTimeout(() => { inner.style.transition = ''; }, 150);
      if (pendingRender) render(pendingRender);
    }, 200);
  }, { passive: false });

  inner.addEventListener('mousedown', (e) => {
    e.preventDefault();
    if (triggered) return;
    writeSignal(pid);
    const data = ackInFile(pid);
    if (data) render(markOrphanSessions(data));
    ipcRenderer.send('hide-window');
  });
}

function updateTimes() {
  document.querySelectorAll('.time[data-ts]').forEach(el => {
    el.textContent = formatTime(Number(el.dataset.ts));
  });
}

function markOrphanSessions(state) {
  if (!Array.isArray(state)) return state;
  let changed = false;
  for (const s of state) {
    if (s.state === 'dead') continue;
    try { process.kill(s.pid, 0); }
    catch { s.state = 'dead'; changed = true; }
  }
  if (changed) {
    try {
      const tmp = STATE_FILE + '.tmp';
      fs.writeFileSync(tmp, JSON.stringify(state, null, 2));
      fs.renameSync(tmp, STATE_FILE);
    } catch {}
  }
  return state;
}

// Watch signal file — notification click or menubar click wrote a PID; ack it
try {
  fs.watch(SIGNAL_FILE, { persistent: false }, () => {
    try {
      const pid = parseInt(fs.readFileSync(SIGNAL_FILE, 'utf-8').trim(), 10);
      if (pid) {
        const data = ackInFile(pid);
        if (data) render(markOrphanSessions(data));
      }
    } catch {}
  });
} catch {}

// Watch state file (unreliable on macOS with atomic mv) + poll fallback
fs.watch(STATE_FILE, { persistent: false }, () => {
  setTimeout(() => render(readStateFile()), 100);
});
setTimeout(() => render(readStateFile()), 100);
setInterval(() => render(markOrphanSessions(readStateFile())), 3000);
setInterval(updateTimes, 30000);
</script>
</body>
</html>
